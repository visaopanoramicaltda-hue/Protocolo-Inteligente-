steps:
  # Instalar dependências
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['ci']

  # Injetar segredos no ambiente de produção
  - name: 'node:20'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        sed -i "s|geminiApiKey: ''|geminiApiKey: '$$GEMINI_API_KEY'|" src/environments/environment.prod.ts
        sed -i "s|mercadoPagoAccessToken: ''|mercadoPagoAccessToken: '$$MERCADO_PAGO_TOKEN'|" src/environments/environment.prod.ts
    secretEnv: ['GEMINI_API_KEY', 'MERCADO_PAGO_TOKEN']

  # Build de produção
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'build']

  # Deploy no Firebase Hosting
  - name: 'gcr.io/$PROJECT_ID/firebase'
    args: ['deploy', '--only', 'hosting', '--project', '$PROJECT_ID']

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/GEMINI_API_KEY/versions/latest
      env: 'GEMINI_API_KEY'
    - versionName: projects/$PROJECT_ID/secrets/MERCADO_PAGO_TOKEN/versions/latest
      env: 'MERCADO_PAGO_TOKEN'

options:
  logging: CLOUD_LOGGING_ONLY
