name: Build Android APK (TWA)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    name: Build & Sign Android APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Source code ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js (Angular build) ──────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci --legacy-peer-deps

      # ── 3. Angular production build ─────────────────────────────────
      - name: Build Angular app (production)
        run: npm run build

      # ── 4. Java (required by Bubblewrap / Gradle) ───────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 5. Bubblewrap TWA build ─────────────────────────────────────
      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Initialise TWA project from PWA manifest
        env:
          # Application identity – override via repo variables when needed
          TWA_PACKAGE_NAME: ${{ vars.TWA_PACKAGE_NAME || 'com.seuusuario.simbiose' }}
          TWA_APP_NAME: "Protocolo Inteligente"
          TWA_HOST: ${{ vars.TWA_HOST || 'your-project-id.web.app' }}
          SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'protocolo' }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'changeme' }}
          SIGNING_STORE_PASSWORD: ${{ secrets.STORE_PASSWORD || 'changeme' }}
        run: |
          mkdir -p twa-build && cd twa-build

          bubblewrap init \
            --manifest "https://${TWA_HOST}/manifest.webmanifest" \
            --directory .

          # Patch twa-manifest.json with correct signing config so build
          # does not prompt for passwords interactively
          node - <<'JS'
          const fs  = require('fs');
          const cfg = JSON.parse(fs.readFileSync('twa-manifest.json', 'utf8'));
          cfg.packageId           = process.env.TWA_PACKAGE_NAME;
          cfg.name                = process.env.TWA_APP_NAME;
          cfg.signingKey.path     = '../protocolo-keystore.jks';
          cfg.signingKey.alias    = process.env.SIGNING_KEY_ALIAS;
          cfg.signingKey.keypassword  = process.env.SIGNING_KEY_PASSWORD;
          cfg.signingKey.storepassword = process.env.SIGNING_STORE_PASSWORD;
          fs.writeFileSync('twa-manifest.json', JSON.stringify(cfg, null, 2));
          console.log('twa-manifest.json patched.');
          JS

      # ── 6. Signing keystore ─────────────────────────────────────────
      - name: Restore or create signing keystore
        env:
          KEYSTORE_BASE64:   ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS || 'protocolo' }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD || 'changeme' }}
          STORE_PASSWORD:    ${{ secrets.STORE_PASSWORD || 'changeme' }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "Restoring keystore from secret…"
            echo "$KEYSTORE_BASE64" | base64 --decode > protocolo-keystore.jks
          else
            echo "No KEYSTORE_BASE64 secret found – generating a debug keystore."
            keytool -genkeypair \
              -alias "${KEY_ALIAS}" \
              -keypass "${KEY_PASSWORD}" \
              -storepass "${STORE_PASSWORD}" \
              -keystore protocolo-keystore.jks \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Protocolo Inteligente, OU=Dev, O=Simbiose, L=BR, ST=BR, C=BR" \
              -noprompt
            echo "Debug keystore created."
          fi

      # ── 7. Build APK via Bubblewrap ──────────────────────────────────
      - name: Build TWA APK
        run: |
          cd twa-build
          bubblewrap build --skipPwaValidation 2>&1 | tee ../bubblewrap-build.log

      # ── 8. Locate and rename output artifacts ────────────────────────
      - name: Locate build artifacts
        id: locate
        run: |
          APK=$(find twa-build -name "*.apk" | head -1)
          AAB=$(find twa-build -name "*.aab" | head -1)
          echo "apk_path=${APK}" >> "$GITHUB_OUTPUT"
          echo "aab_path=${AAB}" >> "$GITHUB_OUTPUT"
          echo "APK: ${APK:-none}"
          echo "AAB: ${AAB:-none}"

      # ── 9. Upload APK artifact ───────────────────────────────────────
      - name: Upload APK
        if: steps.locate.outputs.apk_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: protocolo-inteligente-apk
          path: ${{ steps.locate.outputs.apk_path }}
          retention-days: 30

      # ── 10. Upload AAB artifact (Play Store) ─────────────────────────
      - name: Upload AAB
        if: steps.locate.outputs.aab_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: protocolo-inteligente-aab
          path: ${{ steps.locate.outputs.aab_path }}
          retention-days: 30

      # ── 11. Print SHA-256 fingerprint (for assetlinks.json) ──────────
      - name: Print signing certificate SHA-256
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD || 'changeme' }}
          KEY_ALIAS:      ${{ secrets.KEY_ALIAS || 'protocolo' }}
        run: |
          echo "── SHA-256 fingerprint (copy into assetlinks.json) ──"
          keytool -exportcert \
            -rfc \
            -alias "${KEY_ALIAS}" \
            -keystore protocolo-keystore.jks \
            -storepass "${STORE_PASSWORD}" 2>/dev/null \
          | openssl x509 -noout -fingerprint -sha256 \
          | sed 's/sha256 Fingerprint=//I' \
          | tr -d ':' \
          | sed 's/../&:/g;s/:$//' \
          | tr '[:lower:]' '[:upper:]' \
          || echo "Could not compute fingerprint."
