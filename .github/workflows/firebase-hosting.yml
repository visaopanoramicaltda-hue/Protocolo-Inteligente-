name: Deploy Firebase Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Instalar dependências
        run: npm ci --legacy-peer-deps

      - name: Injetar segredos no ambiente de produção
        run: |
          sed -i "s|geminiApiKey: ''|geminiApiKey: '${{ secrets.GEMINI_API_KEY }}'|" src/environments/environment.prod.ts
          sed -i "s|mercadoPagoAccessToken: ''|mercadoPagoAccessToken: '${{ secrets.MERCADO_PAGO_TOKEN }}'|" src/environments/environment.prod.ts

      - name: Build Angular
        run: npm run build

      - name: Deploy Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
