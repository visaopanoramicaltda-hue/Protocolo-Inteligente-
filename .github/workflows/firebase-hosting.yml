name: Deploy Firebase Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  checks: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Instalar dependências
        run: npm ci --legacy-peer-deps

      - name: Validar segredos do Firebase
        run: |
          missing=""
          if [ -z "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" ]; then
            missing="${missing} FIREBASE_SERVICE_ACCOUNT"
          fi
          if [ -z "${{ secrets.FIREBASE_PROJECT_ID }}" ]; then
            missing="${missing} FIREBASE_PROJECT_ID"
          fi
          if [ -n "$missing" ]; then
            echo "::error::Os seguintes segredos do GitHub não estão configurados:${missing}"
            echo "Configure-os em Settings > Secrets and variables > Actions."
            echo "FIREBASE_SERVICE_ACCOUNT deve conter o JSON da chave da conta de serviço do Firebase."
            echo "FIREBASE_PROJECT_ID deve conter o ID do projeto Firebase."
            exit 1
          fi
          echo "Segredos do Firebase validados com sucesso."

      - name: Injetar segredos no ambiente de produção
        run: |
          sed -i "s|geminiApiKey: ''|geminiApiKey: '${{ secrets.GEMINI_API_KEY }}'|" src/environments/environment.prod.ts
          sed -i "s|mercadoPagoAccessToken: ''|mercadoPagoAccessToken: '${{ secrets.MERCADO_PAGO_TOKEN }}'|" src/environments/environment.prod.ts

      - name: Build Angular
        run: npm run build

      - name: Verificar artefatos de build
        run: |
          if [ ! -d "dist" ]; then
            echo "::error::Diretório 'dist' não encontrado após o build."
            exit 1
          fi
          if [ ! -f "dist/index.html" ]; then
            echo "::error::Arquivo 'dist/index.html' não encontrado. Verifique a configuração do Angular."
            exit 1
          fi
          echo "Artefatos de build verificados com sucesso."

      - name: Deploy Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
