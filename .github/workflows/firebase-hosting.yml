name: Build and Deploy to Firebase Hosting

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Inject secrets into environment
        run: |
          sed -i "s|geminiApiKey: ''|geminiApiKey: '${{ secrets.GEMINI_API_KEY }}'|" src/environments/environment.prod.ts
          sed -i "s|mercadoPagoAccessToken: ''|mercadoPagoAccessToken: '${{ secrets.MERCADO_PAGO_TOKEN }}'|" src/environments/environment.prod.ts

      - name: Build
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
          channelId: live
