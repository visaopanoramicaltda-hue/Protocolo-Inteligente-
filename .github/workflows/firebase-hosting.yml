name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Inject secrets into production environment
        run: |
          sed -i "s|__GEMINI_API_KEY__|$GEMINI_API_KEY|g" src/environments/environment.prod.ts
          sed -i "s|__MERCADO_PAGO_TOKEN__|$MERCADO_PAGO_TOKEN|g" src/environments/environment.prod.ts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MERCADO_PAGO_TOKEN: ${{ secrets.MERCADO_PAGO_TOKEN }}

      - name: Build
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
          channelId: live
